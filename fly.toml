app = 'hylunian-backend'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 3001
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/api/health'

[[mounts]]
  source = 'hylunian_data'
  destination = '/data'
