services:
  - type: web
    runtime: node
    name: hylunian-backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://hylunian.com,https://www.hylunian.com
      - key: APP_NAME
        value: Hylunian
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_INVITE_CODE
        value: hylunian-alpha-2026
      - key: DATABASE_URL
        fromDatabase:
          name: hylunian-db
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

databases:
  - name: hylunian-db
    databaseName: hylunian
    user: hylunian
    plan: free
