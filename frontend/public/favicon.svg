<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hylunianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B05BFF" />
      <stop offset="50%" stop-color="#7C5CFF" />
      <stop offset="100%" stop-color="#3D7CFF" />
    </linearGradient>
    
    <mask id="pixelMask">
      <!-- Base shape is visible (white) -->
      <rect x="0" y="0" width="160" height="160" fill="white" />
      
      <!-- Diagonal 1 (missing pixels) -->
      <rect x="140" y="80" width="20" height="20" fill="black" />
      <rect x="120" y="100" width="20" height="20" fill="black" />
      <rect x="100" y="120" width="20" height="20" fill="black" />
      <rect x="80" y="140" width="20" height="20" fill="black" />
      
      <!-- Diagonal 2 (missing pixels) -->
      <rect x="140" y="120" width="20" height="20" fill="black" />
      <rect x="120" y="140" width="20" height="20" fill="black" />
    </mask>
  </defs>

  <!-- Main body with rounded corners and the pixel mask applied -->
  <rect x="0" y="0" width="160" height="160" rx="24" fill="url(#hylunianGrad)" mask="url(#pixelMask)" />
</svg>